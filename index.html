<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" href="styles.css"/>
    <script src="script.js" defer></script>
    <title>Jogo de Adivinhação!</title>
  </head>
  <body>

  <div class="card">
    <header>
    <h1>Jogo de Adivinhação 🎲</h1>
    <p class="sub">
    Você tem <strong>5 tentativas</strong> para adivinhar um número de <strong>1 a 50</strong>.
    </p>
    </header>

  <main>

    <div class="meta">
    <div class="pill">Tentativas restantes: <strong id="tries">5</strong></div>
    <div class="pill">Intervalo: <strong>1–50</strong></div>
    </div>

    <div class="row">

    <div class="inputWrap">
    <label for="guess">Seu chute</label>
    <input id="guess" type="number" placeholder="Digite um número..." />
    <div class="hint">Dica: pressione Enter para chutar.</div>
    </div>

    <div class="actions">

    <button id="btnGuess" type="button">Chutar</button>

    <button id="btnReset" type="button" style="display:none">
    Jogar Novamente
    </button>

    </div>
    </div>

    <div id="status" class="status">
    Faça um chute para começar!
    </div>

  </main>

  </div>

</body>
</html>
